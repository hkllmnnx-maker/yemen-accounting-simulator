name: Flutter CI

# تشغيل تلقائي: عند كل push أو pull request على main
# Auto-run: on every push or pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze-and-test:
    name: Analyze & Test (Flutter 3.35.4)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.35.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Print Flutter & Dart versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (dart format)
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Static analysis (flutter analyze)
        run: flutter analyze --no-fatal-infos

      - name: Run unit & widget tests
        run: flutter test --reporter expanded

      - name: Build web release
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release-${{ github.sha }}
          path: build/web
          retention-days: 7

  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: analyze-and-test
    # يبني APK فقط عند push على main (لا يبني على PR لتوفير وقت CI)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.35.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
